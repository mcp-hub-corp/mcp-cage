project_name: mcp-cage

builds:
  - id: smcp
    main: ./cmd/smcp
    binary: smcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/security-mcp/mcp-client/internal/cli.Version={{.Version}}
      - -X github.com/security-mcp/mcp-client/internal/cli.GitCommit={{.Commit}}
      - -X github.com/security-mcp/mcp-client/internal/cli.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: smcp
    name_template: "smcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: mcp-hub-corp
    name: mcp-cage
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## smcp {{ .Tag }}

    ### Installation

    ```bash
    brew install mcp-hub-corp/tap/smcp
    ```

    Or download the appropriate binary for your platform below.
  footer: |
    **Full Changelog**: https://github.com/mcp-hub-corp/mcp-cage/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: smcp
    repository:
      owner: mcp-hub-corp
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://mcp-hub.info"
    description: "Run MCP servers without blindly trusting them"
    license: "MIT"
    install: |
      bin.install "smcp"
    test: |
      system "#{bin}/smcp", "--version"
