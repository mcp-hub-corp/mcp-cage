name: PPA Upload

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 0.2.0)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Vendor dependencies
        run: go mod vendor

      - name: Create orig tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          STAGING="$(mktemp -d)"
          cp -a . "$STAGING/smcp-${VERSION}"
          rm -rf "$STAGING/smcp-${VERSION}/.git" "$STAGING/smcp-${VERSION}/debian"
          tar czf "smcp_${VERSION}.orig.tar.gz" -C "$STAGING" "smcp-${VERSION}"
          rm -rf "$STAGING"
          echo "Tarball SHA256: $(sha256sum "smcp_${VERSION}.orig.tar.gz")"

      - name: Upload orig tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: orig-tarball
          path: smcp_${{ steps.version.outputs.version }}.orig.tar.gz
          retention-days: 1

  ppa-upload:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: [noble, jammy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput gpg

      - name: Import GPG key and configure for CI
        env:
          GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "batch" >> ~/.gnupg/gpg.conf
          echo "no-tty" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Download orig tarball
        uses: actions/download-artifact@v4
        with:
          name: orig-tarball
          path: ..

      - name: Verify tarball
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "Tarball SHA256: $(sha256sum "../smcp_${VERSION}.orig.tar.gz")"
          ls -la "../smcp_${VERSION}.orig.tar.gz"

      - name: Generate changelog
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE: ${{ matrix.release }}
        run: |
          RELEASE_VERSION="${VERSION}-1~${RELEASE}1"
          DATE=$(date -R)
          cat > debian/changelog <<EOF
          smcp (${RELEASE_VERSION}) ${RELEASE}; urgency=medium

            * Release v${VERSION} for ${RELEASE}.
            * CLI launcher for certified MCP servers.

           -- Dani <cr0hn@cr0hn.com>  ${DATE}
          EOF
          sed -i 's/^          //' debian/changelog

      - name: Build and sign source package
        env:
          GPG_KEY_ID: ${{ secrets.PPA_GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: |
          debuild -S -sa -d -us -uc
          cat > /tmp/gpg-pass.sh << 'WRAPPER'
          #!/bin/bash
          echo "$GPG_PASSPHRASE" | exec gpg --batch --pinentry-mode loopback --passphrase-fd 0 "$@"
          WRAPPER
          sed -i 's/^          //' /tmp/gpg-pass.sh
          chmod +x /tmp/gpg-pass.sh
          debsign -p /tmp/gpg-pass.sh -k"$GPG_KEY_ID" "../smcp_$(dpkg-parsechangelog --show-field Version)_source.changes"

      - name: Configure dput
        run: |
          cat > ~/.dput.cf <<'DPUT'
          [mcphub-smcp]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~mcphub/smcp/ubuntu/
          login = anonymous
          allow_unsigned_uploads = 0
          DPUT
          sed -i 's/^          //' ~/.dput.cf

      - name: Upload to PPA
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE: ${{ matrix.release }}
        run: |
          RELEASE_VERSION="${VERSION}-1~${RELEASE}1"
          dput mcphub-smcp "../smcp_${RELEASE_VERSION}_source.changes"
