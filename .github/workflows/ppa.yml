name: PPA Upload

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 0.2.0)'
        required: true
        type: string

jobs:
  ppa-upload:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        release: [noble, jammy, oracular]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput gpg

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key and configure for CI
        env:
          GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Configure GPG for non-interactive signing (no TTY in CI)
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "batch" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
          # Pre-cache passphrase with gpg-preset-passphrase
          GPG_KEYGRIP=$(gpg --with-keygrip --list-secret-keys | grep -A1 "sec " | grep Keygrip | awk '{print $3}')
          /usr/lib/gnupg/gpg-preset-passphrase --preset --passphrase "$GPG_PASSPHRASE" "$GPG_KEYGRIP"

      - name: Vendor dependencies
        run: go mod vendor

      - name: Create orig tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          STAGING="$(mktemp -d)"
          cp -a . "$STAGING/mcp-${VERSION}"
          rm -rf "$STAGING/mcp-${VERSION}/.git" "$STAGING/mcp-${VERSION}/debian"
          tar czf "../mcp_${VERSION}.orig.tar.gz" -C "$STAGING" "mcp-${VERSION}"
          rm -rf "$STAGING"

      - name: Generate changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE: ${{ matrix.release }}
        run: |
          RELEASE_VERSION="${VERSION}-1~${RELEASE}1"
          DATE=$(date -R)
          cat > debian/changelog <<EOF
          mcp (${RELEASE_VERSION}) ${RELEASE}; urgency=medium

            * Release v${VERSION} for ${RELEASE}.
            * CLI launcher for certified MCP servers.

           -- Dani <cr0hn@cr0hn.com>  ${DATE}
          EOF
          # Strip leading whitespace from heredoc (YAML indent)
          sed -i 's/^          //' debian/changelog

      - name: Build and sign source package
        env:
          GPG_KEY_ID: ${{ secrets.PPA_GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: |
          # Build unsigned, then sign with explicit passphrase
          debuild -S -sa -d -us -uc
          echo "$GPG_PASSPHRASE" | debsign -k"$GPG_KEY_ID" -p "gpg --batch --pinentry-mode loopback --passphrase-fd 0" "../mcp_$(dpkg-parsechangelog --show-field Version)_source.changes"

      - name: Configure dput
        run: |
          cat > ~/.dput.cf <<'DPUT'
          [mcphub-mcp]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~mcphub/mcp/ubuntu/
          login = anonymous
          allow_unsigned_uploads = 0
          DPUT
          sed -i 's/^          //' ~/.dput.cf

      - name: Upload to PPA
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE: ${{ matrix.release }}
        run: |
          RELEASE_VERSION="${VERSION}-1~${RELEASE}1"
          dput mcphub-mcp "../mcp_${RELEASE_VERSION}_source.changes"
